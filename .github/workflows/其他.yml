name: 其他 Check

on:
  push:
    paths:
      - '其他/**'
  pull_request:
    paths:
      - '其他/**'

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './其他'
